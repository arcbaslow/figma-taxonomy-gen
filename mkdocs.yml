site_name: figma-taxonomy-gen
site_description: Extract interactive UI elements from Figma designs and generate Amplitude event taxonomies.
site_url: https://arcbaslow.github.io/figma-taxonomy-gen/
repo_url: https://github.com/arcbaslow/figma-taxonomy-gen
repo_name: arcbaslow/figma-taxonomy-gen
edit_uri: edit/master/docs/

docs_dir: docs
exclude_docs: |
  superpowers/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Overview: index.md
  - Getting started: getting-started.md
  - CLI reference: cli-reference.md
  - Configuration: configuration.md
  - Guides:
    - How detection works: detection.md
    - AI enrichment: ai-enrichment.md
    - CI drift checks: ci.md
    - Amplitude push: amplitude.md
    - MCP server: mcp.md
  - Cookbook: cookbook.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
